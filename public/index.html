<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Hardware Capabilities</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f172a">
    <link rel="apple-touch-icon" href="/images/icon-192.png">
</head>
<body>
    <div class="app-container">
        <header>
            <h1><i class="fa-solid fa-microchip"></i> Hardware APIs</h1>
            <p>Exploring Native Device Features</p>
            <button id="permissions-btn" class="hidden"><i class="fa-solid fa-lock-open"></i> Request Sensors Permission</button>
        </header>

        <main class="dashboard">
            <!-- Camera Section (Face & Barcode) -->
            <section class="card camera-card">
                <div class="card-header">
                    <h2><i class="fa-solid fa-camera"></i> Vision (Shape Detection)</h2>
                    <div class="toggles">
                        <label><input type="checkbox" id="face-toggle"> Face</label>
                        <label><input type="checkbox" id="barcode-toggle"> Barcode</label>
                    </div>
                </div>
                <div class="video-container">
                    <video id="camera-stream" autoplay playsinline muted></video>
                    <canvas id="overlay-canvas"></canvas>
                    <div id="barcode-result" class="hidden"></div>
                    <div id="unsupported-msg" class="hidden">API Not Supported</div>
                </div>
            </section>

            <!-- Device Orientation Section -->
            <section class="card orientation-card">
                <div class="card-header">
                    <h2><i class="fa-regular fa-compass"></i> Orientation</h2>
                </div>
                <div class="orientation-display">
                    <div class="compass-container">
                        <div class="compass" id="compass-indicator">
                            <i class="fa-solid fa-arrow-up"></i>
                        </div>
                    </div>
                    <div class="data-grid">
                        <div class="data-item"><span>Alpha (Z)</span> <strong id="alpha-val">0.00°</strong></div>
                        <div class="data-item"><span>Beta (X)</span> <strong id="beta-val">0.00°</strong></div>
                        <div class="data-item"><span>Gamma (Y)</span> <strong id="gamma-val">0.00°</strong></div>
                    </div>
                </div>
            </section>

            <!-- Device Motion Section -->
            <section class="card motion-card">
                <div class="card-header">
                    <h2><i class="fa-solid fa-wave-square"></i> Motion</h2>
                </div>
                <div class="motion-display">
                    <div class="accelerometer-visual">
                        <div class="bubble" id="motion-bubble"></div>
                    </div>
                    <div class="data-grid">
                        <div class="data-item"><span>Acc X</span> <strong id="acc-x">0.00</strong></div>
                        <div class="data-item"><span>Acc Y</span> <strong id="acc-y">0.00</strong></div>
                        <div class="data-item"><span>Acc Z</span> <strong id="acc-z">0.00</strong></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/js/main.js"></script>
</body>
</html>
